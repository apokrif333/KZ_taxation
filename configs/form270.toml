[paths]
processed_data = "data/processed"
output_data = "data/output"
form270_template = "data/templates/270 new template.json"

[form270]
# Все сценарии запускаются одной командой:
# .\.venv\Scripts\python.exe -m kztax270 run-270 .\configs\form270.toml
#
# id = "excel"          — сформировать audit Excel из raw-отчётов одного счёта.
# id = "merge_excel"    — объединить несколько audit Excel в merged_Имя_Фамилия.xlsx.
# id = "joint_excel"    — создать audit Excel с долей совместного счёта 50%.
# id = "270_json"       — заполнить 270.00 из одного готового audit Excel.
#
# Задания выполняются сверху вниз. Поэтому можно сначала создать Excel,
# а следующим заданием сразу сформировать JSON из него.

#[[form270.jobs]]
#id = "excel"
#broker = "ib"
#account_id = "U14219740"

# [[form270.jobs]]
# id = "merge_excel"
# workbooks = [
#     "ib_U14219740_audit.xlsx",
#     "freedom_7F8339_audit.xlsx",
#     'freedom_8A0627_audit.xlsx'
# ]
# fio1 = "Виктор"
# fio2 = "Чернооков"
# fio3 = ""

# [[form270.jobs]]
# id = "joint_excel"
# file_name = "ib_U22724380_audit.xlsx"

 [[form270.jobs]]
 id = "270_json"
 file_name = "merged_Чернооков_Виктор.xlsx"
 civ_servant = false
 tax_year = 2025
 fio1 = "Виктор"
 fio2 = "Чернооков"
 fio3 = ""
 iin = "1"
 phone = ""
 email = ""
 ogd_residence = ""
 ogd_location = ""

# Параметры банка/брокера для CashBalances можно задать один раз:
# [form270.banks.ib]
# code = "IBKRUS33XXX"
# name = "Interactive Brokers LLC"
# country = "USA"
